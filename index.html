<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <style>
      div {
        background-color: rgb(37, 37, 55);
        width: fit-content;
        height: auto;
        padding: 30px;
        border-radius: 20px;
      }

      button{
        background-color: black;
        width: 120px;
        height: 40px;
        color: aqua;
        border-radius: 20px;
        margin: 5px;
        box-shadow: 0px 3px 3px black;
      }


      .reset {
        align-self: center;
        display: block;
        margin-top: 30px;
        margin-left: 140px;
        margin-bottom: 20px;
      }

      p {
        font-size: 24px;
        color: aqua;
        margin: 4px;
      }
      .margin {
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <div>
      <p>Rock Paper Scissors Make your pick</p>

      <p>You picked: <span style="color: rgb(255, 0, 0);" id="playerPick"></span></p>
      <p>Computer picked: <span style="color: rgb(255, 0, 0);" id="computerPick"></span></p>
      <p class="margin">You: <span style="color: rgb(3, 252, 44)" id="result"></span></p>

      <button id="rockButton">Rock</button>
      <button id="paperButton">Paper</button>
      <button id="scissorsButton">Scissors</button>
      <button class="reset" id="resetButton">Reset Score</button>
      
      <p>
        Wins: <span id="win"></span>
        Losses: <span id="loss"></span>
        Tie: <span id="tie"></span>
      </p>
    </div>

    <script>
      const score = JSON.parse(localStorage.getItem('score')) || {
        win: 0,
        loss: 0,
        tie: 0
      };

      const playerPickElement = document.getElementById('playerPick');
      const computerPickElement = document.getElementById('computerPick');
      const resultElement = document.getElementById('result');

      const winElement = document.getElementById('win');
      const lossElement = document.getElementById('loss');
      const tieElement = document.getElementById('tie');

      const rockButton = document.getElementById('rockButton');
      const paperButton = document.getElementById('paperButton');
      const scissorsButton = document.getElementById('scissorsButton');
      const resetButton = document.getElementById('resetButton');

      function updateScoreDisplay() {
        winElement.textContent = score.win;
        lossElement.textContent = score.loss;
        tieElement.textContent = score.tie;
      }

      function updateGameDisplay(player, computer, result) {
        if (result === 'Win') {
          resultElement.style.color = 'green';
        } else if (result === 'Loss') {
          resultElement.style.color = 'red';
        } else {
          resultElement.style.color = 'orange';
        }

        if(player === 'Rock') {
          playerPickElement.style.color = 'brown';
        } else if(player === 'Paper') {
          playerPickElement.style.color = 'white';
        } else if(player === 'Scissors') {
          playerPickElement.style.color = 'gray';
        }

        if(computer === 'Rock') {
          computerPickElement.style.color = 'brown';
        } else if(computer === 'Paper') {
          computerPickElement.style.color = 'white';
        } else if(computer === 'Scissors') {
          computerPickElement.style.color = 'gray';
        }

        playerPickElement.innerHTML = player + `<img src="Grafika/${player}.png" alt="${player}" height="50px" width="50px">`;
        computerPickElement.innerHTML = computer + `<img src="Grafika/${computer}.png" alt="${computer}" height="50px" width="50px">`;
        resultElement.textContent = result;
       

      }

      function saveScore() {
        localStorage.setItem('score', JSON.stringify(score));
      }

      function getComputerMove() {
        const randomNumber = Math.random();

        if (randomNumber < 1 / 3) {
          return 'Rock';
        } else if (randomNumber < 2 / 3) {
          return 'Paper';
        } else {
          return 'Scissors';
        }
      }

      function playGame(playerMove) {
        const computerMove = getComputerMove();
        let result = '';

        if (playerMove === computerMove) {
          score.tie++;
          result = 'Tie';
        } else if (
          (playerMove === 'Rock' && computerMove === 'Scissors') ||
          (playerMove === 'Paper' && computerMove === 'Rock') ||
          (playerMove === 'Scissors' && computerMove === 'Paper')
        ) {
          score.win++;
          result = 'Win';
        } else {
          score.loss++;
          result = 'Loss';
        }

        saveScore();
        updateScoreDisplay();
        updateGameDisplay(playerMove, computerMove, result);
      }

      function resetScore() {
        score.win = 0;
        score.loss = 0;
        score.tie = 0;

        localStorage.removeItem('score');
        updateScoreDisplay();
        updateGameDisplay('', '', '');
      }

      rockButton.addEventListener('click', function () {
        playGame('Rock');
      });

      paperButton.addEventListener('click', function () {
        playGame('Paper');
      });

      scissorsButton.addEventListener('click', function () {
        playGame('Scissors');
      });

      resetButton.addEventListener('click', function () {
        resetScore();
      });

      updateScoreDisplay();
    </script>
  </body>
</html>
